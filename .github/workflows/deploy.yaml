name: "KFG-v3 Production Deploy"

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  terraform:
    name: "Infrastructure (Terraform)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: HashiCorp Setup
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.0"

      - name: Terraform Init
        # Must happen FIRST to download providers
        run: terraform -chdir=terraform/environments/prod init -input=false
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GCP_SA_KEY }}

      - name: Terraform Plan
        # Must happen SECOND
        run: terraform -chdir=terraform/environments/prod plan -input=false
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GCP_SA_KEY }}
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}

  build-and-push:
    name: "Build Services"
    needs: terraform
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [signal-gateway, ai-agent, worker-pubsub]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/${{ matrix.service }}:${{ github.sha }} ./services/${{ matrix.service }}