name: "KFG-v3 Production Deploy"

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  terraform:
    name: "Infrastructure (Terraform)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. Official GCP Auth (Handles the credentials file for Terraform automatically)
      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: HashiCorp Setup
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.0"

      - name: Terraform Init
        run: terraform -chdir=terraform/environments/prod init -input=false

      - name: Terraform Plan
        run: terraform -chdir=terraform/environments/prod plan -input=false
        env:
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}

  build-and-push:
    name: "Build Services"
    needs: terraform
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [signal-gateway, ai-agent, worker-pubsub]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Auth again for Docker (to push to GCR)
      - id: 'auth-docker'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: 'Docker Auth'
        run: gcloud auth configure-docker --quiet

      # 3. FIX: Build from ROOT so Docker can see the /pkg directory
      - name: Build Docker Image
        run: |
          docker build -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/${{ matrix.service }}:${{ github.sha }} \
          -f services/${{ matrix.service }}/Dockerfile .